---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: ubuntu-noble
    image: ubuntu:24.04
    dockerfile: Dockerfile.j2
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns: host
    network: host
    tmpfs:
      /run: "rw"
      /tmp: "rw"
provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    group_vars:
      all:
        is_molecule: true
        # Fix podman in podman issue: Error: netavark: setns: IO error: Operation not permitted (os error 1)
        vault_podman_args: --network=host
        vault_supplemental_groups:
          - supplemental
verifier:
  name: testinfra
